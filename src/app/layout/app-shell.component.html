<header>
  <a class="brand" [routerLink]="authService.role() === 'admin' ? '/admin/products' : '/products'">
    <span>SM</span>
    Product Portal
  </a>

  <nav aria-label="Main navigation">
    @if (authService.role() === 'admin') {
      <a routerLink="/admin/products" routerLinkActive="active">Administration</a>
    }
    <a routerLink="/products" routerLinkActive="active">Products</a>
  </nav>

  <div class="account">
    @if (authService.currentUser(); as user) {
      <div>
        <strong>{{ user.name }}</strong>
        <span>{{ authService.role() }}</span>
      </div>
    }
    <button type="button" (click)="authService.logout()">Sign out</button>
  </div>
</header>

<main>
  @if (authService.role() === 'admin') {
    <aside class="admin-banner">
      <span>Admin tools are enabled</span>
      <button type="button">Create announcement</button>
    </aside>
  }
  <router-outlet />
</main>
